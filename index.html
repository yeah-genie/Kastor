<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kastor Data Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0f111a', // Very dark blue/black
              surface: '#1e212b',    // Dark panel
              surfaceHighlight: '#272a36',
              border: '#363b4d',
              primary: '#6366f1',
            },
            animation: {
                'flow': 'flow 1s linear infinite',
                'flash': 'flash 0.5s ease-out forwards',
            },
            keyframes: {
                flow: {
                    '0%': { strokeDashoffset: '24' },
                    '100%': { strokeDashoffset: '0' },
                },
                flash: {
                    '0%': { boxShadow: '0 0 0 0px rgba(16, 185, 129, 0.7)' },
                    '100%': { boxShadow: '0 0 0 10px rgba(16, 185, 129, 0)' },
                }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f111a;
        color: #e2e8f0;
        overflow: hidden; /* Prevent body scroll, handle in app */
        overscroll-behavior: none; /* Prevent browser swipe navigation */
        touch-action: none; /* Disable browser handling of gestures to allow custom canvas control */
      }
      /* Custom scrollbar for general panels */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e212b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Utility to hide scrollbar but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* Grid Pattern for Infinite Canvas */
      .infinite-grid {
          background-image: radial-gradient(#363b4d 1px, transparent 1px);
          background-size: 40px 40px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "react/jsx-runtime": "https://aistudiocdn.com/react@^19.2.0/jsx-runtime",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
